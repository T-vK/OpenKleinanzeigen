name: Deploy Pages

# Redeploy GitHub Pages from the latest release APK (no Gradle rebuild).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get install -y -qq jq
          TAG=$(curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name')
          ASSET=$(curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -1)
          curl -fsSL -L -o release.apk "$ASSET"
          echo "Downloaded $TAG"

      - name: Cache F-Droid repo signing key
        uses: actions/cache@v4
        with:
          path: fdroid/keystore.p12
          key: fdroid-repo-signing-key-v1

      - name: Build F-Droid repository
        env:
          FDROID_KEYSTORE_BASE64: ${{ secrets.FDROID_KEYSTORE_BASE64 }}
        run: |
          chmod +x scripts/build_fdroid_repo.sh scripts/setup_fdroid_repo.sh scripts/build_fdroid_repo.py
          ./scripts/setup_fdroid_repo.sh
          ./scripts/build_fdroid_repo.sh release.apk

      - name: Prepare GitHub Pages layout
        run: |
          mkdir -p pages/fdroid
          cp -a fdroid/. pages/fdroid/
          python3 -c "from PIL import Image; im=Image.open('pages/fdroid/repo/icons/icon.png'); assert max(im.size)<=256, f'bad repo icon {im.size}'; print('repo icon', im.size)"
          touch pages/.nojekyll
          cat > pages/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>OpenKleinanzeigen</title>
          <meta http-equiv="refresh" content="0; url=fdroid/repo/"></head>
          <body><p><a href="fdroid/repo/">F-Droid repository</a></p></body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
