name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version from commit message
        id: bump
        run: |
          chmod +x scripts/version_bump.sh
          BEFORE=$(cat version.properties)
          MSG="${{ github.event.head_commit.message }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MSG="${MSG:-[patch]}"
          fi
          ./scripts/version_bump.sh "$MSG"
          AFTER=$(cat version.properties)
          if [[ "$BEFORE" != "$AFTER" ]]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            git add version.properties
            git commit -m "chore: bump version to $(grep VERSION_NAME version.properties | cut -d= -f2) [skip ci]"
            git push
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - id: version
        run: |
          echo "version_name=$(grep VERSION_NAME version.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "version_code=$(grep VERSION_CODE version.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Prepare release signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" ]]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            cat >> gradle.properties <<EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          RELEASE_KEY_ALIAS=$KEY_ALIAS
          RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          EOF
          else
            echo "No KEYSTORE_BASE64 secret — release APK will be signed with the debug key (installable, for testing)."
          fi

      - name: Build release APK
        run: chmod +x gradlew && ./gradlew assembleRelease --stacktrace

      - name: Package versioned APK
        run: |
          VERSION=$(grep VERSION_NAME version.properties | cut -d= -f2)
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" "OpenKleinanzeigen-${VERSION}.apk"

      - name: Verify APK is signed
        run: |
          APK=$(ls OpenKleinanzeigen-*.apk | head -1)
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS/apksigner" verify --verbose "$APK"

      - name: Cache F-Droid repo signing key
        uses: actions/cache@v4
        with:
          path: fdroid/keystore.p12
          key: fdroid-repo-signing-key-v1

      - name: Build F-Droid repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fdroidserver
          chmod +x scripts/build_fdroid_repo.sh scripts/setup_fdroid_repo.sh
          ./scripts/setup_fdroid_repo.sh
          ./scripts/build_fdroid_repo.sh "$(ls OpenKleinanzeigen-*.apk | head -1)"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: OpenKleinanzeigen-*.apk

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: fdroid

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: OpenKleinanzeigen ${{ steps.version.outputs.version_name }}
          files: OpenKleinanzeigen-*.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download GitHub Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
