name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      apk_name: ${{ steps.package.outputs.apk_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version from commit message
        run: |
          chmod +x scripts/version_bump.sh
          BEFORE=$(cat version.properties)
          MSG="${{ github.event.head_commit.message }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MSG="${MSG:-[patch]}"
          fi
          ./scripts/version_bump.sh "$MSG"
          AFTER=$(cat version.properties)
          if [[ "$BEFORE" != "$AFTER" ]]; then
            git add version.properties
            git commit -m "chore: bump version to $(grep VERSION_NAME version.properties | cut -d= -f2) [skip ci]"
            git push
          fi

      - id: version
        run: |
          echo "version_name=$(grep VERSION_NAME version.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "version_code=$(grep VERSION_CODE version.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}-35
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      # Single APK build (debug) — used for GitHub Releases and the F-Droid repo.
      - name: Build debug APK
        run: ./gradlew assembleDebug --build-cache --stacktrace

      - id: package
        run: |
          VERSION=$(grep VERSION_NAME version.properties | cut -d= -f2)
          APK_NAME="OpenKleinanzeigen-${VERSION}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "Packaged $APK_NAME ($(du -h "$APK_NAME" | cut -f1))"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS/apksigner" verify --verbose "${{ steps.package.outputs.apk_name }}"

      - name: Cache F-Droid repo signing key
        uses: actions/cache@v4
        with:
          path: fdroid/keystore.p12
          key: fdroid-repo-signing-key-v1

      - name: Build F-Droid repository
        env:
          FDROID_KEYSTORE_BASE64: ${{ secrets.FDROID_KEYSTORE_BASE64 }}
        run: |
          pip install --upgrade fdroidserver
          chmod +x scripts/build_fdroid_repo.sh scripts/setup_fdroid_repo.sh
          ./scripts/setup_fdroid_repo.sh
          ./scripts/build_fdroid_repo.sh "${{ steps.package.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ${{ steps.package.outputs.apk_name }}

      - name: Upload F-Droid Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: fdroid

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: OpenKleinanzeigen ${{ steps.version.outputs.version_name }}
          files: ${{ steps.package.outputs.apk_name }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
