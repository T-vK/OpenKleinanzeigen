Summary: Unofficial open-source Kleinanzeigen client with local search agents and messaging.

Description: |
  OpenKleinanzeigen is a privacy-friendly, open-source client for kleinanzeigen.de focused on buyers.

  Features:
  • Search listings without an account
  • Local search agents with notifications
  • Optional login for messages and Kleinanzeigen-side agents
  • Auto-update from the project F-Droid repository (opt-in)

  This app uses the unofficial mobile API (NonFreeNet anti-feature).
